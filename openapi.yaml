openapi: 3.1.0
info:
  title: OrbitPay API
  version: 1.0.0
  description: OrbitPay analytics and payment-streaming API

servers:
  - url: http://localhost:3001
    description: Local development

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
        requestId:
          type: string

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

paths:
  /health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        '200':
          description: All dependencies healthy
        '503':
          description: One or more dependencies degraded

  /auth/nonce:
    post:
      summary: Request a wallet authentication nonce
      description: |
        Issues a one-time challenge nonce for a Stellar wallet address.
        The caller must sign the returned `message` string (UTF-8 encoded) with
        their Ed25519 secret key and submit the 64-byte signature (base64) to
        `POST /auth/verify` within 5 minutes.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [walletAddress]
              properties:
                walletAddress:
                  type: string
                  pattern: '^G[A-Z2-7]{55}$'
                  description: Stellar Ed25519 public key in StrKey format (56-character G… address)
                  example: GAEZI5NYGV2SSLA3CBGMONDNP74BG74A6BXQVF5SCIJVLKZ3DPAXMFN
      responses:
        '200':
          description: Nonce issued — sign the `message` field with your Ed25519 secret key
          content:
            application/json:
              schema:
                type: object
                properties:
                  walletAddress:
                    type: string
                  nonce:
                    type: string
                    description: Random hex nonce (64 hex chars)
                  message:
                    type: string
                    description: Exact UTF-8 string the client must sign — "OrbitPay authentication nonce: <nonce>"
                  expiresInSeconds:
                    type: integer
              example:
                walletAddress: GAEZI5NYGV2SSLA3CBGMONDNP74BG74A6BXQVF5SCIJVLKZ3DPAXMFN
                nonce: a3f9c12de04b17865e9f234abc78de01a3f9c12de04b17865e9f234abc78de01
                message: "OrbitPay authentication nonce: a3f9c12de04b17865e9f234abc78de01a3f9c12de04b17865e9f234abc78de01"
                expiresInSeconds: 300
        '400':
          description: Invalid wallet address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/verify:
    post:
      summary: Verify wallet signature and obtain a JWT
      description: |
        Verifies an Ed25519 signature over the challenge message issued by `POST /auth/nonce`.

        **Signing protocol:**
        1. Obtain `message` from `/auth/nonce` (format: `"OrbitPay authentication nonce: <nonce>"`).
        2. Encode the message as UTF-8 bytes.
        3. Sign the raw bytes with your Stellar Ed25519 secret key (no prehashing).
        4. Base64-encode the 64-byte signature and submit it here.

        The nonce is single-use: a successful or failed verification attempt consumes it.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [walletAddress, signature]
              properties:
                walletAddress:
                  type: string
                  pattern: '^G[A-Z2-7]{55}$'
                  description: The same Stellar public key used to request the nonce
                  example: GAEZI5NYGV2SSLA3CBGMONDNP74BG74A6BXQVF5SCIJVLKZ3DPAXMFN
                signature:
                  type: string
                  description: Base64-encoded 64-byte Ed25519 signature of the UTF-8 challenge message
                  example: W+2rGpz3F8hqALj4Kne7XRcmT0YvdsBfNpIUoE1Czk9V6OxRHaJ5MtPsDwQlbYi/ZuKsNmOcXgvATEpWh8FDBA==
      responses:
        '200':
          description: Authentication successful — JWT `sub` is the authenticated wallet address
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: HS256 JWT; include as `Authorization: Bearer <token>` on subsequent requests
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJHQUVaST...
        '400':
          description: Bad request (missing or malformed fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid or expired nonce / signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/streams:
    get:
      summary: List payment streams
      tags: [Streams]
      parameters:
        - in: query
          name: sender
          schema:
            type: string
            pattern: '^G[A-Z2-7]{55}$'
        - in: query
          name: recipient
          schema:
            type: string
            pattern: '^G[A-Z2-7]{55}$'
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - in: query
          name: cursor
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated streams
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/streams/{id}:
    get:
      summary: Get stream detail with claim history
      tags: [Streams]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Stream detail
        '404':
          description: Stream not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/treasury/{addr}/events:
    get:
      summary: Treasury event log for an address
      tags: [Treasury]
      parameters:
        - in: path
          name: addr
          required: true
          schema:
            type: string
            pattern: '^G[A-Z2-7]{55}$'
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - in: query
          name: cursor
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated treasury events
        '400':
          description: Invalid address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/proposals:
    get:
      summary: List governance proposals
      tags: [Proposals]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Paginated proposals

  /api/proposals/{id}:
    get:
      summary: Get proposal detail
      tags: [Proposals]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Proposal
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/proposals/{id}/votes:
    get:
      summary: List votes for a proposal
      tags: [Proposals]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        '200':
          description: Paginated votes

  /api/vesting:
    get:
      summary: List vesting schedules for a beneficiary
      tags: [Vesting]
      parameters:
        - in: query
          name: beneficiary
          required: true
          schema:
            type: string
            pattern: '^G[A-Z2-7]{55}$'
      responses:
        '200':
          description: Vesting schedules
        '400':
          description: Invalid or missing beneficiary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/vesting/{id}/progress:
    get:
      summary: Get vesting progress for a schedule
      tags: [Vesting]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Vesting progress
        '404':
          description: Schedule not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
